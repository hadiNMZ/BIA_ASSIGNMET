services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "127.0.0.1:8050:8050"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/bia
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:24-bookworm-slim
    working_dir: /app/frontend
    command: ["node", "dev-server.mjs"]
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      API_BASE: https://api.svu.store.abdulha.de
    volumes:
      - ./frontend:/app/frontend:ro
    depends_on:
      - api

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: bia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
